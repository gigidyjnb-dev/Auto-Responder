<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Setup Status — Auto-Responder</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .platform-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 12px;
        margin-top: 14px;
      }

      .platform-card {
        background: rgba(255,255,255,0.9);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px 16px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .platform-card .name {
        font-weight: 700;
        font-size: 0.95rem;
      }

      .platform-card .note {
        font-size: 0.8rem;
        color: var(--muted);
      }

      .badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 700;
        align-self: flex-start;
        margin-bottom: 4px;
      }

      .badge-ready     { background: #d1faeb; color: #076644; }
      .badge-partial   { background: #fef3c7; color: #91620a; }
      .badge-bridge    { background: #e0f2fe; color: #0c5498; }
      .badge-missing   { background: #fee2e2; color: #9b1c1c; }

      .checklist {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .checklist li {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        font-size: 0.9rem;
      }

      .check-icon {
        flex-shrink: 0;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.7rem;
        font-weight: 800;
        margin-top: 1px;
      }

      .check-ok   { background: #d1faeb; color: #076644; }
      .check-warn { background: #fef3c7; color: #91620a; }
      .check-fail { background: #fee2e2; color: #9b1c1c; }
    </style>
  </head>
  <body>
    <nav class="topnav">
      <a href="/">Respond</a>
      <a href="/admin.html">Admin Queue</a>
      <a href="/setup-status.html" class="active">Setup Status</a>
    </nav>

    <main class="page">
      <header class="hero">
        <p class="eyebrow">SETUP STATUS</p>
        <h1>Configuration Check</h1>
        <p class="subtitle">See what's working and what needs configuration before going live.</p>
      </header>

      <section class="card" id="checklistCard">
        <h2>Readiness Checklist</h2>
        <ul class="checklist" id="checklist">
          <li><span class="check-icon check-warn">…</span><span>Loading…</span></li>
        </ul>
      </section>

      <section class="card">
        <h2>Platform Integrations</h2>
        <div class="platform-grid" id="platformGrid">
          <p style="color:var(--muted)">Loading platforms…</p>
        </div>
      </section>
    </main>

    <script src="/setup-status.js"></script>
  </body>
</html>
