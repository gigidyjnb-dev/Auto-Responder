<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Listings — Auto-Responder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .listings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .listing-card {
      background: white;
      border-radius: 12px;
      border: 1px solid #e1e5e9;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }
    .listing-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    .listing-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: #f5f5f5;
    }
    .listing-content {
      padding: 16px;
    }
    .listing-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
    }
    .listing-price {
      font-size: 20px;
      font-weight: 700;
      color: #0066ff;
      margin-bottom: 8px;
    }
    .listing-description {
      font-size: 14px;
      color: #666;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .no-listings {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="bg-shape shape-a"></div>
  <div class="bg-shape shape-b"></div>

  <nav class="topnav">
    <a href="/">Home</a>
    <a href="/app.html">Dashboard</a>
    <a href="/listings" class="active">Listings</a>
  </nav>

  <main class="page">
    <header class="hero">
      <p class="eyebrow">MARKETPLACE LISTINGS</p>
      <h1>Your Synced Listings</h1>
      <p class="subtitle">
        View all your marketplace listings synced via webhooks or other methods.
      </p>
    </header>

    <div id="loading" class="loading">Loading listings...</div>
    <div id="listingsContainer" class="listings-grid" style="display: none;"></div>
    <div id="noListings" class="no-listings" style="display: none;">
      <h2>No listings yet</h2>
      <p>Sync your marketplace listings using the webhook integration or other methods.</p>
      <a href="/app.html" class="btn">Go to Dashboard</a>
    </div>

    <div id="debug" style="margin-top: 20px; padding: 10px; background: #f0f0f0; border: 1px solid #ccc; display: none;">
      <h3>Debug Info</h3>
      <pre id="debugContent"></pre>
    </div>
  </main>

  <script>
async function loadListings() {
  try {
    const response = await fetch('/api/products');
    const data = await response.json();
    const listings = data.listings || [];

    // Debug info
    document.getElementById('debugContent').textContent = JSON.stringify({
      total: listings.length,
      listings: listings.slice(0, 3), // Show first 3 for debugging
      response: data
    }, null, 2);
    document.getElementById('debug').style.display = 'block';

    const container = document.getElementById('listingsContainer');
    const loading = document.getElementById('loading');
    const noListings = document.getElementById('noListings');

    loading.style.display = 'none';

    if (listings.length === 0) {
      noListings.style.display = 'block';
      return;
    }

    container.style.display = 'grid';

    listings.forEach(listing => {
      const card = document.createElement('div');
      card.className = 'listing-card';

      const imageUrl = listing.images && listing.images[0] ? listing.images[0] : 'https://via.placeholder.com/300x200?text=No+Image';
      const price = listing.price || 'Contact for price';
      const description = listing.description || 'No description available';

      card.innerHTML = `
        <img src="${imageUrl}" alt="${listing.title}" class="listing-image" onerror="this.src='https://via.placeholder.com/300x200?text=Image+Error'">
        <div class="listing-content">
          <div class="listing-title">${listing.title}</div>
          <div class="listing-price">${price}</div>
          <div class="listing-description">${description}</div>
          <div style="font-size: 12px; color: #666; margin-top: 8px;">ID: ${listing.id}</div>
        </div>
      `;

      container.appendChild(card);
    });
  } catch (error) {
    console.error('Error loading listings:', error);
    document.getElementById('loading').innerHTML = `Error loading listings: ${error.message}. Please try again.`;
    document.getElementById('debugContent').textContent = `Error: ${error.message}`;
    document.getElementById('debug').style.display = 'block';
  }
}

    loadListings();
  </script>
</body>
</html>
