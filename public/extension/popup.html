<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listing Sync</title>
  <style>
    body {
      width: 350px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9f9f9;
    }
    h2 { margin: 0 0 12px 0; font-size: 16px; color: #1a1a1a; }
    .platform-select { width: 100%; padding: 8px; margin-bottom: 12px; }
    button {
      width: 100%;
      padding: 10px;
      margin: 4px 0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    .sync-btn { background: #0066ff; color: white; }
    .sync-btn:hover { background: #0052cc; }
    .status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }
    .status.success { background: #d4edda; color: #155724; display: block; }
    .status.error { background: #f8d7da; color: #721c24; display: block; }
    .status.info { background: #d1ecf1; color: #0c5460; display: block; }
    .progress-bar {
      height: 4px;
      background: #e0e0e0;
      border-radius: 2px;
      overflow: hidden;
      margin: 8px 0;
    }
    .progress-fill {
      height: 100%;
      background: #0066ff;
      width: 0%;
      transition: width 0.3s;
    }
    .listing-count {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h2>Sync Listings</h2>
  <select id="platform" class="platform-select">
    <option value="">Select platform...</option>
    <option value="facebook_marketplace">Facebook Marketplace</option>
    <option value="ebay">eBay</option>
    <option value="etsy">Etsy</option>
    <option value="offerup">OfferUp</option>
    <option value="mercari">Mercari</option>
    <option value="poshmark">Poshmark</option>
    <option value="craigslist">Craigslist</option>
  </select>
  <button id="syncBtn" class="sync-btn">Sync My Listings</button>
  <div id="status" class="status"></div>
  <div class="progress-bar" id="progressBar" style="display: none;">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="listing-count" id="listingCount"></div>

  <script src="popup.js"></script>
</body>
</html>
